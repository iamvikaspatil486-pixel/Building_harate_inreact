<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Navigator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    color: #fff;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #0f0;
    border: 1px solid #0f04;
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 32px;
    background: #0f01;
  }

  h1 {
    font-size: clamp(28px, 8vw, 48px);
    font-weight: 900;
    background: linear-gradient(90deg, #f0f #0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    text-align: center;
    letter-spacing: -1px;
  }

  .sub {
    font-size: 13px;
    color: #ffffff30;
    margin-bottom: 40px;
    text-align: center;
  }

  .input-wrap {
    width: 100%;
    max-width: 400px;
    position: relative;
    margin-bottom: 16px;
  }

  input {
    width: 100%;
    background: #ffffff08;
    border: 1px solid #ffffff15;
    border-radius: 14px;
    padding: 14px 50px 14px 18px;
    font-size: 16px;
    color: #fff;
    outline: none;
    font-family: 'Courier New', monospace;
    transition: border-color 0.2s;
  }

  input:focus {
    border-color: #f0f6;
  }

  input::placeholder { color: #ffffff25; }

  .go-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: linear-gradient(135deg, #f0f, #0ff);
    border: none;
    border-radius: 8px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: opacity 0.2s, transform 0.1s;
  }

  .go-btn:active { transform: translateY(-50%) scale(0.9); }

  /* Suggestions */
  #suggestions {
    width: 100%;
    max-width: 400px;
    background: #111;
    border: 1px solid #ffffff10;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 24px;
    display: none;
  }

  .suggestion {
    padding: 11px 18px;
    cursor: pointer;
    font-size: 14px;
    color: #ffffff70;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.15s;
    border-bottom: 1px solid #ffffff08;
  }

  .suggestion:last-child { border-bottom: none; }
  .suggestion:hover, .suggestion.active { background: #ffffff08; color: #fff; }
  .suggestion .icon { font-size: 16px; width: 20px; text-align: center; }
  .suggestion .path { margin-left: auto; font-size: 11px; color: #ffffff25; }

  /* Quick links grid */
  .grid {
    width: 100%;
    max-width: 400px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 32px;
  }

  .quick {
    background: #ffffff05;
    border: 1px solid #ffffff0a;
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.15s, border-color 0.15s;
    text-decoration: none;
    color: inherit;
  }

  .quick:hover {
    background: #ffffff0d;
    border-color: #ffffff20;
  }

  .quick .icon { font-size: 18px; }

  .quick .info { overflow: hidden; }
  .quick .label { font-size: 13px; font-weight: 700; color: #ffffffcc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .quick .route { font-size: 10px; color: #ffffff30; margin-top: 1px; }

  /* History */
  #historySection { width: 100%; max-width: 400px; }
  .history-title {
    font-size: 10px;
    letter-spacing: 2px;
    color: #ffffff20;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .history-list { display: flex; flex-wrap: wrap; gap: 6px; }

  .hist-tag {
    background: #ffffff07;
    border: 1px solid #ffffff10;
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 12px;
    color: #ffffff40;
    cursor: pointer;
    transition: all 0.15s;
  }

  .hist-tag:hover { background: #ffffff12; color: #fff; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #ff0044;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 999px;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  .divider {
    width: 100%;
    max-width: 400px;
    height: 1px;
    background: #ffffff08;
    margin: 20px 0;
  }
</style>
</head>
<body>

<span class="badge">⚡ Dev Mode</span>
<h1>Go anywhere.</h1>
<p class="sub">Type a page name or route → hit Enter</p>

<div class="input-wrap">
  <input
    id="pageInput"
    type="text"
    placeholder="home, chat, login, /create..."
    autocomplete="off"
    spellcheck="false"
  />
  <button class="go-btn" onclick="navigate()">→</button>
</div>

<div id="suggestions"></div>

<!-- Quick links -->
<div class="grid" id="quickGrid"></div>

<div class="divider"></div>

<!-- History -->
<div id="historySection">
  <p class="history-title">Recent</p>
  <div class="history-list" id="historyList"></div>
</div>

<div id="toast">Page not found</div>

<script>
// ── Page Registry ─────────────────────────────────────────────────────────────
// Edit this list to match your actual routes
const PAGES = [
  { label: "Home",        route: "/",            icon: "🏠", keys: ["home", "feed", "index"] },
  { label: "Login",       route: "/login",        icon: "🔐", keys: ["login", "auth", "signin"] },
  { label: "Register",    route: "/register",     icon: "📝", keys: ["register", "signup", "join"] },
  { label: "Chat",        route: "/chat",         icon: "💬", keys: ["chat", "messages", "dm"] },
  { label: "Create Post", route: "/create",       icon: "✍️",  keys: ["create", "post", "new"] },
  { label: "Notice Board",route: "/notices",      icon: "📌", keys: ["notice", "board", "notices"] },
  { label: "Profile",     route: "/profile",      icon: "👤", keys: ["profile", "me", "user"] },
  { label: "Students",    route: "/students",     icon: "🎓", keys: ["students", "list", "batch"] },
  { label: "Games",       route: "/games",        icon: "🎮", keys: ["games", "play", "rps"] },
  { label: "Poll",        route: "/poll",         icon: "📊", keys: ["poll", "vote", "polls"] },
  { label: "Settings",    route: "/settings",     icon: "⚙️",  keys: ["settings", "config"] },
  { label: "Dev",         route: "/dev.html",     icon: "🛠️",  keys: ["dev", "debug", "navigator"] },
];

// Quick access (shown as grid) — first 6
const QUICK = PAGES.slice(0, 6);

// ── State ─────────────────────────────────────────────────────────────────────
let selectedIdx = -1;
let currentMatches = [];

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  renderQuickGrid();
  renderHistory();
  document.getElementById("pageInput").focus();
});

// ── Quick grid ────────────────────────────────────────────────────────────────
function renderQuickGrid() {
  const grid = document.getElementById("quickGrid");
  grid.innerHTML = QUICK.map(p => `
    <div class="quick" onclick="go('${p.route}')">
      <span class="icon">${p.icon}</span>
      <div class="info">
        <div class="label">${p.label}</div>
        <div class="route">${p.route}</div>
      </div>
    </div>
  `).join("");
}

// ── History ───────────────────────────────────────────────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem("devnav_history") || "[]"); } catch { return []; }
}

function addHistory(route) {
  const h = getHistory().filter(r => r !== route);
  h.unshift(route);
  localStorage.setItem("devnav_history", JSON.stringify(h.slice(0, 8)));
}

function renderHistory() {
  const list = document.getElementById("historyList");
  const h = getHistory();
  if (!h.length) { list.innerHTML = '<span style="font-size:12px;color:#ffffff15">none yet</span>'; return; }
  list.innerHTML = h.map(r => `
    <span class="hist-tag" onclick="go('${r}')">${r}</span>
  `).join("");
}

// ── Input handler ─────────────────────────────────────────────────────────────
document.getElementById("pageInput").addEventListener("input", onInput);
document.getElementById("pageInput").addEventListener("keydown", onKeyDown);

function onInput() {
  const q = document.getElementById("pageInput").value.trim().toLowerCase();
  const sugEl = document.getElementById("suggestions");
  selectedIdx = -1;

  if (!q) { sugEl.style.display = "none"; currentMatches = []; return; }

  currentMatches = PAGES.filter(p =>
    p.label.toLowerCase().includes(q) ||
    p.route.toLowerCase().includes(q) ||
    p.keys.some(k => k.includes(q))
  );

  if (!currentMatches.length) { sugEl.style.display = "none"; return; }

  sugEl.style.display = "block";
  sugEl.innerHTML = currentMatches.map((p, i) => `
    <div class="suggestion" data-i="${i}" onclick="go('${p.route}')">
      <span class="icon">${p.icon}</span>
      <span>${p.label}</span>
      <span class="path">${p.route}</span>
    </div>
  `).join("");
}

function onKeyDown(e) {
  const sug = document.getElementById("suggestions");
  const items = sug.querySelectorAll(".suggestion");

  if (e.key === "ArrowDown") {
    e.preventDefault();
    selectedIdx = Math.min(selectedIdx + 1, items.length - 1);
    updateActive(items);
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    selectedIdx = Math.max(selectedIdx - 1, -1);
    updateActive(items);
  } else if (e.key === "Enter") {
    if (selectedIdx >= 0 && currentMatches[selectedIdx]) {
      go(currentMatches[selectedIdx].route);
    } else {
      navigate();
    }
  } else if (e.key === "Escape") {
    sug.style.display = "none";
    selectedIdx = -1;
  }
}

function updateActive(items) {
  items.forEach((el, i) => {
    el.classList.toggle("active", i === selectedIdx);
  });
}

// ── Navigate ──────────────────────────────────────────────────────────────────
function navigate() {
  const raw = document.getElementById("pageInput").value.trim().toLowerCase();
  if (!raw) return;

  // Direct route match (starts with /)
  if (raw.startsWith("/")) { go(raw); return; }

  // Find best match
  const match = PAGES.find(p =>
    p.label.toLowerCase() === raw ||
    p.keys.includes(raw) ||
    p.route.replace("/", "") === raw
  ) || PAGES.find(p =>
    p.label.toLowerCase().startsWith(raw) ||
    p.keys.some(k => k.startsWith(raw))
  );

  if (match) { go(match.route); }
  else { showToast(`"${raw}" not found`); }
}

function go(route) {
  addHistory(route);
  window.location.href = route;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>
</body>
</html>
