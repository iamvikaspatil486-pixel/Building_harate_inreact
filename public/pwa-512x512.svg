<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background matching your app's slate theme -->
  <rect width="512" height="512" rx="110" fill="#0f172a"/>
  
  <!-- Interconnected H-Chat Graphic -->
  <g transform="translate(116, 126)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left Chat Column Profile -->
    <path d="M40 40 V180 C40 210, 70 220, 70 220 L40 240 V200 H80 C110 200, 110 160, 110 160" fill="none" stroke="#3b82f6" stroke-width="28"/>
    <!-- Connecting Bridge Element -->
    <line x1="90" y1="130" x2="190" y2="130" stroke="#3b82f6" stroke-width="28"/>
    <!-- Right Chat Column Profile -->
    <path d="M240 220 V80 C240 50, 210 40, 210 40 L240 20 V60 H170 C140 60, 140 100, 140 100" fill="none" stroke="#60a5fa" stroke-width="28"/>
  </g>
  
  <!-- Subtle inner ambient glow border -->
  <rect x="10" y="10" width="492" height="492" rx="100" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8"/>
</svg>

